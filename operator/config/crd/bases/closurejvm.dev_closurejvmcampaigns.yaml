---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: closurejvmcampaigns.closurejvm.dev
spec:
  group: closurejvm.dev
  names:
    kind: ClosureJVMCampaign
    listKind: ClosureJVMCampaignList
    plural: closurejvmcampaigns
    singular: closurejvmcampaign
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.name
      name: Target
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.coveragePct
      name: Coverage
      type: string
    - jsonPath: .status.findings
      name: Findings
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClosureJVMCampaign is the Schema for the closurejvmcampaigns
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ClosureJVMCampaignSpec defines the desired state of ClosureJVMCampaign.
              Exactly one of driver.duration / driver.iterations must be set.
            properties:
              baseURL:
                description: |-
                  BaseURL is the app's HTTP entrypoint the driver hits. REQUIRED — the operator doesn't front the
                  app with a Service of its own, so the campaign names it.
                minLength: 1
                type: string
              dashboard:
                description: CampaignDashboardSpec configures the dashboard for a
                  campaign.
                properties:
                  enabled:
                    default: true
                    description: |-
                      Enabled (default true): the operator creates a per-campaign dashboard Deployment+Service,
                      garbage-collected with the campaign.
                    type: boolean
                  externalPush:
                    description: 'ExternalPush (host:port): push to an existing/shared
                      dashboard instead of creating one.'
                    type: string
                type: object
              driver:
                description: CampaignDriverSpec configures the coverage-guided runner
                  (CoverageGuidedRun).
                properties:
                  classesPath:
                    default: /usr/local/tomcat/webapps/ROOT/WEB-INF/classes
                    description: |-
                      ClassesPath is where the app's .class files live inside the TARGET's container image; an
                      initContainer copies them out for JaCoCo coverage analysis (DD-025 §7b).
                    type: string
                  corpusConfigMap:
                    type: string
                  duration:
                    description: |-
                      One of Duration / Iterations bounds the run (validated on the campaign). Duration is a Go-style
                      string (e.g. "10m", "30s"); the runner exits cleanly at the deadline so its summary is written.
                    type: string
                  grammarConfigMap:
                    description: Grammar / corpus come from a ConfigMap (structure/values
                      as data, DD-016/DD-018).
                    type: string
                  grammarKey:
                    type: string
                  invariants:
                    description: Invariants passed through to the driver JVM as -Dclosurejvm.invariant.*
                      flags.
                    properties:
                      heapDeltaMaxKb:
                        description: HeapDeltaMaxKb is the per-iteration heap-delta
                          threshold in KB.
                        format: int32
                        type: integer
                      latencyMaxMs:
                        description: LatencyMaxMs is the per-iteration latency threshold
                          in milliseconds.
                        format: int32
                        type: integer
                      mode:
                        default: soft
                        description: Mode is "soft" (collect signals) or "hard" (fail
                          the iteration).
                        enum:
                        - soft
                        - hard
                        type: string
                    type: object
                  iterations:
                    format: int64
                    minimum: 1
                    type: integer
                type: object
              targetRef:
                description: TargetRef is the ClosureJVMTarget to drive (must be Injected
                  before the run starts).
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - baseURL
            - driver
            - targetRef
            type: object
            x-kubernetes-validations:
            - message: set exactly one of driver.duration or driver.iterations
              rule: (has(self.driver.duration) && self.driver.duration != '') != (has(self.driver.iterations)
                && self.driver.iterations > 0)
          status:
            description: ClosureJVMCampaignStatus defines the observed state of ClosureJVMCampaign.
            properties:
              completionTime:
                format: date-time
                type: string
              conditions:
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              coveragePct:
                description: CoveragePct/Findings are read from the driver's end-of-run
                  summary (DD-025 §7a).
                type: string
              dashboardURL:
                type: string
              driverJob:
                type: string
              findings:
                format: int32
                type: integer
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: CampaignPhase is a coarse lifecycle summary.
                enum:
                - Pending
                - Provisioning
                - Running
                - Completed
                - Failed
                type: string
              startTime:
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
