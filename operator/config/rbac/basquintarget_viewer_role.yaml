# permissions for end users to view basquintargets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: basquintarget-viewer-role
rules:
- apiGroups:
  - basquin.dev
  resources:
  - basquintargets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - basquin.dev
  resources:
  - basquintargets/status
  verbs:
  - get
