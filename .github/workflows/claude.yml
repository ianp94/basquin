# Claude Code in GitHub Actions — mention @claude in an issue/PR comment or review to trigger.
# Auth: CLAUDE_CODE_OAUTH_TOKEN repo secret (Max-plan subscription token from `claude setup-token`,
# ~1-year expiry — regenerate and `gh secret set CLAUDE_CODE_OAUTH_TOKEN` when it lapses).
# Comments are authored by the Claude GitHub App identity, not a personal account.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Gate on the @claude mention here (not just inside the action) so non-mention comments
    # don't spin up a runner at all.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # lets Claude read CI results on the PR it is reviewing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
