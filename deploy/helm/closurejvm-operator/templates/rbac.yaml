{{- /*
Namespaced RBAC. The operator is namespaced by design (it manages only its own namespace), so these
are Roles + RoleBindings, not ClusterRoles — the whole install is namespace-scoped except the CRDs.
The manager rules MIRROR operator/config/rbac/role.yaml (keep in sync when RBAC markers change; run
deploy/helm/sync-generated.sh). The leader-election rules are kubebuilder boilerplate.
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "closurejvm-operator.fullname" . }}-manager-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "closurejvm-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["closurejvm.dev"]
    resources: ["closurejvmtargets", "closurejvmcampaigns"]
    verbs: ["get", "list", "patch", "update", "watch"]
  - apiGroups: ["closurejvm.dev"]
    resources: ["closurejvmtargets/status", "closurejvmcampaigns/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["closurejvm.dev"]
    resources: ["closurejvmtargets/finalizers", "closurejvmcampaigns/finalizers"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "closurejvm-operator.fullname" . }}-manager-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "closurejvm-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "closurejvm-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "closurejvm-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.leaderElect }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "closurejvm-operator.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "closurejvm-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "closurejvm-operator.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "closurejvm-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "closurejvm-operator.fullname" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ include "closurejvm-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
