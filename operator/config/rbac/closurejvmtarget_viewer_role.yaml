# permissions for end users to view closurejvmtargets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: closurejvmtarget-viewer-role
rules:
- apiGroups:
  - closurejvm.dev
  resources:
  - closurejvmtargets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - closurejvm.dev
  resources:
  - closurejvmtargets/status
  verbs:
  - get
