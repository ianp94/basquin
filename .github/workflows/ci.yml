name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle build
        uses: gradle/gradle-build-action@v3
      - name: Build
        run: ./gradlew build --no-daemon --warning-mode all
      - name: Test
        run: ./gradlew test --no-daemon --warning-mode all

  leak-demo:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle build
        uses: gradle/gradle-build-action@v3
      - name: Leak demo should fail (expected)
        shell: bash
        run: |
          set +e
          ./gradlew runRunnerLeak --no-daemon --warning-mode all
          status=$?
          echo "Leak demo exit status: $status"
          if [ $status -eq 0 ]; then
            echo "ERROR: Leak demo unexpectedly succeeded" >&2
            exit 1
          fi
          echo "Leak demo failed as expected"
