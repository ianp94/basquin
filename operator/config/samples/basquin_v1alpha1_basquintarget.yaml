# Example BasquinTarget mirroring the JPetStore demo (docs/OPERATOR-DESIGN.md §3). In P1 applying
# this only makes the controller OBSERVE the named Deployment and report status — no pod is mutated.
apiVersion: basquin.dev/v1alpha1
kind: BasquinTarget
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: jpetstore
spec:
  deploymentRef:
    name: jpetstore
  container: jpetstore
  jvmOptsVar: CATALINA_OPTS      # a Tomcat image; non-Tomcat JVMs use JAVA_TOOL_OPTIONS
  agents:
    threadTracker: true
    valve: true
    coverage:
      enabled: true
      port: 6300
      includes: "org.mybatis.jpetstore.*"   # REQUIRED when enabled; never "*" (DD-022)
  invariants:
    mode: soft
    latencyMaxMs: 25
    heapDeltaMaxKb: 256
  dashboardPush: "basquin-dashboard.demo.svc:7070"
  coverageService: true
