// Build configuration for ClosureJVM
plugins {
    id 'java'
    id 'application'
}

group = 'com.closurejvm'
version = '0.2.0'
// Target Java 17 bytecode so artifacts run on JDK 17 and 21+ alike.
// CI verifies the build and tests on both 17 and 21 (see .github/workflows/ci.yml).
sourceCompatibility = '17'
targetCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'net.bytebuddy:byte-buddy:1.14.12'
    testImplementation 'junit:junit:4.13.2'
}

// Optional configuration for Javalin demo so main build doesn't require it
configurations {
    javalinDemo
    jqf
    jacocoAgent   // resolves the standalone jacocoagent.jar to inject into the target JVM
}

def jacocoVersion = '0.8.12'

dependencies {
    javalinDemo 'io.javalin:javalin:5.6.2'
    // JQF dependencies (scoped): only resolved for fuzz tasks
    jqf 'edu.berkeley.cs.jqf:jqf-fuzz:1.9'
    jqf 'edu.berkeley.cs.jqf:jqf-instrument:1.9'
    // JaCoCo agent (runtime classifier = the standalone -javaagent jar)
    jacocoAgent "org.jacoco:org.jacoco.agent:${jacocoVersion}:runtime"
}

// Use current repo layout instead of src/main/java
sourceSets {
    main {
        java {
            srcDirs = ['agent', 'runner', 'examples']
            // Exclude JQF harness + coverage client from main; compiled in separate source sets
            exclude 'fuzz/**', 'server/**', 'coverage/**'
        }
        resources {
            // Dashboard UI assets, loaded from the classpath by DashboardServer
            srcDirs = ['resources']
        }
    }
    test {
        java {
            srcDirs = ['test']
        }
        resources {
            srcDirs = []
        }
    }
    // Separate source set for fuzz harnesses to avoid pulling JQF into main build
    fuzz {
        java {
            srcDirs = ['examples/fuzz']
        }
        resources { srcDirs = [] }
        compileClasspath += sourceSets.main.output
        runtimeClasspath += output + compileClasspath
    }
    server {
        java {
            srcDirs = ['examples/server']
        }
        resources { srcDirs = [] }
        compileClasspath += sourceSets.main.output
        runtimeClasspath += output + compileClasspath
    }
    // Client-side JaCoCo coverage collection; kept out of the main jar.
    coverage {
        java {
            srcDirs = ['runner/coverage']
        }
        resources { srcDirs = [] }
        compileClasspath += sourceSets.main.output
        runtimeClasspath += output + compileClasspath
    }
}

// Add compile dependencies for the fuzz source set after it is defined
dependencies {
    fuzzImplementation 'junit:junit:4.13.2'
    fuzzImplementation 'edu.berkeley.cs.jqf:jqf-fuzz:1.9'
    fuzzImplementation 'edu.berkeley.cs.jqf:jqf-instrument:1.9'
    coverageImplementation "org.jacoco:org.jacoco.core:${jacocoVersion}"
    // Let unit tests reach the coverage source set (RequestGrammar et al). Without this the
    // grammar/sequence logic would stay untestable purely because of where it lives.
    testImplementation sourceSets.coverage.output
    serverImplementation 'org.apache.tomcat.embed:tomcat-embed-core:10.1.24'
    serverImplementation 'jakarta.servlet:jakarta.servlet-api:6.0.0'
}

application {
    mainClass = 'runner.Runner' // thin wrapper that forwards to GenericRunner
}

// Create a simple jar task
jar {
    manifest {
        attributes(
            'Main-Class': 'runner.Runner',
            'Premain-Class': 'agent.Agent'
        )
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

