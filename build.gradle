// --- JVMTI native agent (optional) ---
// Compiles native/closurejvmti.c to build/native/libclosurejvmti.{so,dylib}.
// Requires a C compiler (cc/gcc) and JDK headers; skipped gracefully if no compiler is found,
// so it is never a hard dependency of the normal build.
def nativeLibName = org.gradle.internal.os.OperatingSystem.current().isMacOsX()
        ? 'libclosurejvmti.dylib' : 'libclosurejvmti.so'
def nativeLib = layout.buildDirectory.file("native/${nativeLibName}").get().asFile

tasks.register('buildNativeAgent', Exec) {
    group = 'build'
    description = 'Compile the JVMTI native agent (native/closurejvmti.c). Requires a C compiler + JDK headers.'
    def cc = System.getenv('CC') ?: 'cc'
    onlyIf {
        try {
            def p = ['sh', '-c', "command -v ${cc}"].execute()
            p.waitFor() == 0
        } catch (ignored) {
            false
        }
    }
    workingDir 'native'
    commandLine 'make'
    inputs.file 'native/closurejvmti.c'
    outputs.file nativeLib
}

// Demo: GenericRunner with the native agent injected (builds the agent first).
tasks.register('runGenericNativeProper', JavaExec) {
    group = 'application'
    description = 'Run GenericRunner in proper mode with the JVMTI native agent loaded for thread counts.'
    dependsOn 'buildNativeAgent'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'runner.GenericRunner'
    doFirst {
        jvmArgs "-agentpath:${nativeLib.absolutePath}",
                "-Dclosurejvm.native.lib=${nativeLib.absolutePath}",
                '-Dexamples.sleepMs=1', '-Dexamples.threads=2', '-Dexamples.mode=proper'
    }
    args '20', 'examples.targets.ThreadLeakTarget'
}

// Standalone dashboard/aggregator (DD-013): run once, point any number of drivers at it with
// -Dclosurejvm.dashboard.push=host:port. Deliberately not embedded in any driver process.
tasks.register('runDashboard', JavaExec) {
    group = 'application'
    description = 'Standalone dashboard server. Drivers push status/findings to it; never embedded in a driver or the app under test.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'runner.util.DashboardServer'
    systemProperties System.getProperties().findAll { k, v -> k.toString().startsWith('closurejvm.dashboard') }
}

// HTTP route driver against a running app (e.g. JPetStore). Client-side latency + crash
// detection, with the live status screen enabled. Point it at a running server first.
tasks.register('runHttpDrive', JavaExec) {
    group = 'application'
    description = 'Drive HTTP routes of a running app with the live status screen. Config via -Dexamples.http.baseUrl / -Dexamples.http.routes.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'runner.GenericRunner'
    systemProperties System.getProperties().findAll { k, v -> k.toString().startsWith('examples.http.') || k.toString().startsWith('closurejvm.') }
    jvmArgs '-Dclosurejvm.status=true'
    args System.getProperty('drive.iterations', '200'), 'examples.targets.HttpRouteDriveTarget'
}

// Copy the JaCoCo agent jar to a stable path for mounting into a target container.
tasks.register('copyJacocoAgent', Copy) {
    group = 'build'
    description = 'Copy the JaCoCo agent jar to build/jacoco/jacocoagent.jar (for -javaagent in the target JVM).'
    from configurations.jacocoAgent
    into layout.buildDirectory.dir('jacoco')
    rename '.*', 'jacocoagent.jar'
}

// Coverage-guided-over-HTTP driver: polls the target's JaCoCo coverage into the live panel,
// then drives HTTP routes. Point it at a running app that has the JaCoCo agent + valve.
tasks.register('runHttpDriveCoverage', JavaExec) {
    group = 'application'
    description = 'Drive HTTP routes while showing the app-under-test coverage % from its JaCoCo agent.'
    classpath = sourceSets.coverage.runtimeClasspath
    mainClass = 'runner.coverage.CoverageDriver'
    jvmArgs '-Dclosurejvm.status=true'
    systemProperties System.getProperties().findAll { k, v ->
        k.toString().startsWith('examples.http.') || k.toString().startsWith('closurejvm.') }
    args System.getProperty('drive.iterations', '300'), 'examples.targets.HttpRouteDriveTarget'
}

// Coverage-GUIDED exploration: mutate HTTP inputs, keep the ones that reach new code (the
// coverage % climbs). Requires the target's JaCoCo agent + the app's class files.
tasks.register('runCoverageGuided', JavaExec) {
    group = 'application'
    description = 'Coverage-guided HTTP exploration: mutate inputs toward new coverage of the app under test.'
    classpath = sourceSets.coverage.runtimeClasspath
    mainClass = 'runner.coverage.CoverageGuidedRun'
    jvmArgs '-Dclosurejvm.status=true'
    systemProperties System.getProperties().findAll { k, v ->
