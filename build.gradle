// Minimization runner: ddmin-like reduction for an input
tasks.register('minimizeInput', JavaExec) {
    group = 'verification'
    description = 'Minimize a crashing input for a given target (writes output file).'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'runner.MinimizeRunner'
    doFirst {
        def target = System.getProperty('closurejvm.target')
        def inFile = System.getProperty('closurejvm.min.input')
        def outFile = System.getProperty('closurejvm.min.output') ?: 'fuzz-results/minimized.bin'
        if (!target || !inFile) {
            throw new GradleException('Usage: -Dclosurejvm.target=<FQCN> -Dclosurejvm.min.input=<path> [-Dclosurejvm.min.output=<path>]')
        }
        args target, inFile, outFile
    }
}

