name: CI

on:
  push:
    paths:
      - 'agent/**'
      - 'runner/**'
      - 'examples/**'
      - 'test/**'
      - 'native/**'
      - 'tomcat-war/**'
      - 'tomcat-valve/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'deploy/bench/**'
  pull_request:
    paths:
      - 'agent/**'
      - 'runner/**'
      - 'examples/**'
      - 'test/**'
      - 'native/**'
      - 'tomcat-war/**'
      - 'tomcat-valve/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'deploy/bench/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    name: build-and-test (JDK ${{ matrix.java }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      # Pure-Python, no JDK needed, so these run before the Gradle steps. Four consecutive review
      # rounds on a prior PR blocked on a hand-written benchmark number, and one misquote survived
      # all four; check_claims.py fails if a coverage figure in prose disagrees with
      # bench-results/campaigns.json. test_redact.py pins that credential redaction never touches a
      # ${{ }} corpus recipe. A guard that only runs when someone remembers it will drift.
      - name: Bench artifact drift guards
        run: |
          python3 deploy/bench/check_claims.py
          python3 deploy/bench/test_redact.py
      - name: Gradle build
        uses: gradle/gradle-build-action@v3
      - name: Build
        run: ./gradlew build --no-daemon --warning-mode all
      - name: Test
        run: ./gradlew test --no-daemon --warning-mode all
      - name: Check (verifications)
        run: ./gradlew check --no-daemon --warning-mode all
      - name: Build valve module
        run: ./gradlew :tomcat-valve:jar --no-daemon --warning-mode all

  native-agent:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle build
        uses: gradle/gradle-build-action@v3
      - name: Build native agent (gcc + JDK headers)
        run: ./gradlew buildNativeAgent --no-daemon --warning-mode all
      - name: Smoke test — agent loads and tracks thread lifecycle
        shell: bash
        run: |
          set -e
          LIB="$(pwd)/build/native/libbasquinjvmti.so"
          test -f "$LIB" || { echo "native lib not built" >&2; exit 1; }
          ./gradlew jar --no-daemon --warning-mode all
          # Run a short proper-mode loop with the agent injected; must complete cleanly.
          java -agentpath:"$LIB" -Dbasquin.native.lib="$LIB" \
            -Dbasquin.target=examples.targets.ThreadLeakTarget \
            -Dexamples.mode=proper -Dexamples.sleepMs=1 -Dexamples.threads=2 \
            -cp build/libs/basquin-0.3.0.jar runner.GenericRunner 20 examples.targets.ThreadLeakTarget

  leak-demo:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle build
        uses: gradle/gradle-build-action@v3
      - name: Leak demo should fail (expected)
        shell: bash
        run: |
          set +e
          ./gradlew runRunnerLeak --no-daemon --warning-mode all
          status=$?
          echo "Leak demo exit status: $status"
          if [ $status -eq 0 ]; then
            echo "ERROR: Leak demo unexpectedly succeeded" >&2
            exit 1
          fi
          echo "Leak demo failed as expected"
