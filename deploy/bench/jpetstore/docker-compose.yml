# JPetStore-6 (javax) on Tomcat 9 with the Basquin valve + agent. In-memory HSQLDB (no external DB).
# WAR built from mybatis/jpetstore-6 @ pinned SHA (see deploy/bench/README.md). Mounts the WAR as ROOT.
services:
  jpetstore:
    image: tomcat:9.0-jdk17-temurin
    ports:
      - "${TOMCAT_HOST_PORT:-8092}:8080"
    environment:
      - CATALINA_OPTS=-javaagent:/usr/local/tomcat/basquin-agent.jar -Xbootclasspath/a:/usr/local/tomcat/basquin-agent.jar -Dbasquin.invariant.mode=${INVARIANT_MODE:-soft} -Dbasquin.invariant.latency.maxMs=${INVARIANT_LATENCY_MS:-25} -Dbasquin.invariant.latency.sample=true -Dbasquin.invariant.heapDelta.maxKb=${INVARIANT_HEAP_KB:-256} ${CATALINA_OPTS_EXTRA:-}
    volumes:
      - ./jpetstore.war:/usr/local/tomcat/webapps/ROOT.war:ro
      - ../../../build/libs/basquin-0.3.0.jar:/usr/local/tomcat/basquin-agent.jar:ro
      - ../../../tomcat-valve/build/libs/basquin-valve-0.3.0.jar:/usr/local/tomcat/lib/basquin-valve.jar:ro
      - ../../../deploy/valve/context.xml:/usr/local/tomcat/conf/context.xml:ro
