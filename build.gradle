    args System.getProperty('drive.iterations', '600')
}

// JQF fuzzing (v0.3 preview) — only resolves when explicitly run
tasks.register('runFuzzJQF', JavaExec) {
    group = 'verification'
    description = 'Run JQF with the Iteration harness. Usage: -Dclosurejvm.target=<FQCN>'
    onlyIf { Boolean.getBoolean('enableJQF') }
    dependsOn 'classes', 'compileFuzzJava'
    classpath = sourceSets.fuzz.runtimeClasspath + sourceSets.main.runtimeClasspath + configurations.jqf
    mainClass = 'org.junit.runner.JUnitCore'
    args 'examples.fuzz.JQFIterationHarness'
    doFirst {
        def agentJar = configurations.jqf.resolve().find { it.name.contains('jqf-instrument') }
        if (agentJar != null) {
            jvmArgs "-javaagent:${agentJar.absolutePath}"
        } else {
            logger.lifecycle('Warning: jqf-instrument agent jar not found; coverage guidance may not work')
        }
        if (!System.getProperty('closurejvm.target')) {
            throw new GradleException('Set -Dclosurejvm.target=<FQCN of IterationTarget>')
        }
        // Optional seeds & results directories
        def seeds = System.getProperty('closurejvm.fuzz.seedsDir')
        def tgt = System.getProperty('closurejvm.target')
        def simple = tgt?.tokenize('.')?.last() ?: 'generic'
        def results = System.getProperty('closurejvm.fuzz.resultsDir') ?: "fuzz-results/${simple.toLowerCase()}"
        if (seeds) {
            jvmArgs "-Djqf.zest.seeds=${seeds}", "-Dclosurejvm.fuzz.preseedDir=${seeds}"
        }
        jvmArgs "-Djqf.ei.DIRECTORY=${results}"
        if (!System.getProperty('closurejvm.fuzz.resultsDir')) {
            jvmArgs "-Dclosurejvm.fuzz.resultsDir=${results}"
        }
    }
}

tasks.register('runFuzzCalculatorJQF', JavaExec) {
    group = 'verification'
    description = 'Run JQF on CalculatorFuzzTarget with optional results saving.'
    onlyIf { Boolean.getBoolean('enableJQF') }
    dependsOn 'classes', 'compileFuzzJava'
    classpath = sourceSets.fuzz.runtimeClasspath + sourceSets.main.runtimeClasspath + configurations.jqf
    mainClass = 'org.junit.runner.JUnitCore'
    args 'examples.fuzz.JQFIterationHarness'
    doFirst {
        def agentJar = configurations.jqf.resolve().find { it.name.contains('jqf-instrument') }
        if (agentJar != null) {
            jvmArgs "-javaagent:${agentJar.absolutePath}"
        }
        jvmArgs '-Dclosurejvm.target=examples.targets.CalculatorFuzzTarget'
        // Forward the live-status flags into the fuzz JVM so the exploration panel shows.
        ['closurejvm.status', 'closurejvm.status.intervalMs', 'closurejvm.status.forceTty',
         'closurejvm.status.explore'].each { k ->
            def v = System.getProperty(k); if (v != null) jvmArgs "-D${k}=${v}"
        }
        // Allow user override of resultsDir; default to fuzz-results
        def results = System.getProperty('closurejvm.fuzz.resultsDir') ?: 'fuzz-results/calculator'
        jvmArgs "-Djqf.ei.DIRECTORY=${results}"
        jvmArgs "-Dclosurejvm.fuzz.resultsDir=${results}"
        // Seeds
        def seeds = System.getProperty('closurejvm.fuzz.seedsDir') ?: 'examples/corpus/calculator'
        jvmArgs "-Djqf.zest.seeds=${seeds}", "-Dclosurejvm.fuzz.preseedDir=${seeds}"
    }
}

// Corpus replay runner (no JQF): feed each file as input to a target
tasks.register('runCorpusReplay', JavaExec) {
    group = 'verification'
    description = 'Replay a corpus directory against a target implementing IterationTarget (+InputReceiver).'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'runner.CorpusRunner'
    doFirst {
        def target = System.getProperty('closurejvm.target')
        def corpus = System.getProperty('closurejvm.corpusDir') ?: 'corpus'
        if (!target) throw new GradleException('Set -Dclosurejvm.target=<FQCN>')
        jvmArgs "-Dclosurejvm.corpusDir=${corpus}" // allow override
        args target, corpus
    }
}

