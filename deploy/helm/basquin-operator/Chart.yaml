apiVersion: v2
name: basquin-operator
description: |-
  The Basquin Kubernetes operator — instrument an unmodified app with a BasquinTarget and run
  bounded coverage-guided tests with a BasquinCampaign. Namespaced by design (Role/RoleBinding in
  one namespace; install one release per namespace you want to instrument).
type: application
# The PUBLISHED chart version is the release tag (release.yml packages with --version <tag>
# --app-version <tag>, overriding these). Keep both in step with the latest release so a plain
# `helm package` from a checkout doesn't regress to an older version. (#47 review)
version: 0.3.0
appVersion: "0.3.0"
keywords:
  - testing
  - availability
  - fuzzing
  - jvm
  - operator
home: https://ianp94.github.io/basquin/
sources:
  - https://github.com/ianp94/basquin
