<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ClosureJVM Status</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; color: #222; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .label { color: #666; font-size: 0.9rem; }
    .value { font-size: 2rem; font-weight: 600; }
    .ok { color: #2e7d32; }
    .warn { color: #f57c00; }
    .bad { color: #c62828; }
    .row { margin-top: 1.5rem; }
    code { background: #f6f8fa; padding: 0.2rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>ClosureJVM Status</h1>
  <div class="grid">
    <div class="card">
      <div class="label">Requests</div>
      <div class="value" id="requests">0</div>
    </div>
    <div class="card">
      <div class="label">Crashes</div>
      <div class="value bad" id="crashes">0</div>
    </div>
    <div class="card">
      <div class="label">Invariant Events</div>
      <div class="value warn" id="invariants">0</div>
    </div>
  </div>

  <div class="row">
    <div class="label">Endpoint</div>
    <div><code id="endpoint">/closurejvm/status</code></div>
  </div>

  <script>
    const requestsEl = document.getElementById('requests');
    const crashesEl = document.getElementById('crashes');
    const invsEl = document.getElementById('invariants');
    const epEl = document.getElementById('endpoint');
    const endpoint = '/closurejvm/status';
    epEl.textContent = endpoint;

    async function tick() {
      try {
        const res = await fetch(endpoint, { cache: 'no-store' });
        const data = await res.json();
        requestsEl.textContent = data.requests ?? 0;
        crashesEl.textContent = data.crashes ?? 0;
        invsEl.textContent = data.invariants ?? 0;
      } catch (e) {
        console.error('status fetch failed', e);
      }
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
