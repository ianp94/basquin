# A RoleBinding (NOT a ClusterRoleBinding) binding the manager-role ClusterRole. Binding a ClusterRole
# via a RoleBinding grants its verbs ONLY within this RoleBinding's namespace — so the operator's
# standing privilege is "patch/read in one namespace," never cluster-wide (docs/OPERATOR-DESIGN.md §6).
# The ClusterRole is just a reusable permission SET that controller-gen regenerates; the RoleBinding
# here is what scopes it, and it is not regenerated, so this stays namespaced across `make manifests`.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: manager-role
subjects:
- kind: ServiceAccount
  name: controller-manager
  namespace: system
