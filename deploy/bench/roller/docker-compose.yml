# Apache Roller 6.1.5 (javax/Servlet 4.0) on Tomcat 9 + a PRE-SEEDED PostgreSQL, with the Basquin
# valve + agent — the laptop equivalent of k8s.yaml. Run setup.sh first (explodes roller.war ->
# webapp/, writes roller-custom.properties, emits seed/), then:
#   docker build -f Dockerfile.db -t basquin/roller-db:0.2.0 .
#   TOMCAT_HOST_PORT=8091 docker compose up -d
# The DB service MUST be named roller-db: that hostname is baked into the JDBC URL in
# webapp/WEB-INF/classes/roller-custom.properties.
services:
  roller-db:
    image: basquin/roller-db:0.2.0     # postgres:16-alpine + Roller's DDL + the bench seed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roller -d roller"]
      interval: 3s
      timeout: 3s
      retries: 20
  roller:
    image: tomcat:9.0-jdk17-temurin
    depends_on:
      roller-db: { condition: service_healthy }   # the ROOT context dies if the DB is not up yet
    ports:
      - "${TOMCAT_HOST_PORT:-8091}:8080"
    environment:
      # latency budget 250ms, not 25ms: /basquin/search is ~530ms on this app by construction
      # (Lucene + an uncached Velocity render), so a 25ms budget fires on every search.
      - CATALINA_OPTS=-javaagent:/usr/local/tomcat/basquin-agent.jar -Xbootclasspath/a:/usr/local/tomcat/basquin-agent.jar -Dbasquin.invariant.mode=${INVARIANT_MODE:-soft} -Dbasquin.invariant.latency.maxMs=${INVARIANT_LATENCY_MS:-250} -Dbasquin.invariant.latency.sample=true -Dbasquin.invariant.heapDelta.maxKb=${INVARIANT_HEAP_KB:-512} ${CATALINA_OPTS_EXTRA:-}
    volumes:
      - ./webapp:/usr/local/tomcat/webapps/ROOT:ro
      - ./roller_data:/var/roller/data
      - ./postgresql.jar:/usr/local/tomcat/lib/postgresql.jar:ro
      # Without these two the ROOT context never starts (ClassNotFoundException: javax.mail.Session).
      - ./tomcat-lib/javax.mail.jar:/usr/local/tomcat/lib/javax.mail.jar:ro
      - ./tomcat-lib/javax.activation.jar:/usr/local/tomcat/lib/javax.activation.jar:ro
      - ../../../build/libs/basquin-0.3.0.jar:/usr/local/tomcat/basquin-agent.jar:ro
      - ../../../tomcat-valve/build/libs/basquin-valve-0.3.0.jar:/usr/local/tomcat/lib/basquin-valve.jar:ro
      - ../../../deploy/valve/context.xml:/usr/local/tomcat/conf/context.xml:ro
