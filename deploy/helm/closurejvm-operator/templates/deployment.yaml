apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "closurejvm-operator.controllerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "closurejvm-operator.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- /* Stable selector — not the churny helm.sh/chart label. */}}
      app.kubernetes.io/name: {{ include "closurejvm-operator.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "closurejvm-operator.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        control-plane: controller-manager
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "closurejvm-operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          {{- /* One shared image tag: imageTag, else the chart's appVersion (single-source version). */}}
          {{- $tag := .Values.imageTag | default .Chart.AppVersion }}
          image: "{{ .Values.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.leaderElect }}
            - --leader-elect
            {{- end }}
            {{- with .Values.images.agents }}
            - --agents-image={{ . }}:{{ $tag }}
            {{- end }}
            {{- with .Values.images.runner }}
            - --runner-image={{ . }}:{{ $tag }}
            {{- end }}
            {{- with .Values.images.dashboard }}
            - --dashboard-image={{ . }}:{{ $tag }}
            {{- end }}
          env:
            # Namespaced by design: the operator watches its own namespace (refuses to start if empty).
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
