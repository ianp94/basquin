# permissions for end users to view closurejvmcampaigns.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: closurejvmcampaign-viewer-role
rules:
- apiGroups:
  - closurejvm.dev
  resources:
  - closurejvmcampaigns
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - closurejvm.dev
  resources:
  - closurejvmcampaigns/status
  verbs:
  - get
