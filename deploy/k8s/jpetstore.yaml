# JPetStore demo pod with Basquin agents (valve + Basquin agent + JaCoCo), plus a Service
# exposing the app (8080) and the JaCoCo coverage tcpserver (6300). Access from the host via:
#   kubectl port-forward svc/jpetstore 8080:8080 6300:6300
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jpetstore
  labels: { app: jpetstore, part-of: basquin-demo }
spec:
  replicas: 1
  selector:
    matchLabels: { app: jpetstore }
  template:
    metadata:
      labels: { app: jpetstore, part-of: basquin-demo }
    spec:
      containers:
        - name: jpetstore
          image: basquin/jpetstore-demo:latest
          imagePullPolicy: IfNotPresent   # image is loaded into kind, not pulled
          ports:
            - { name: http, containerPort: 8080 }
            - { name: jacoco, containerPort: 6300 }
          readinessProbe:
            httpGet: { path: /actions/Catalog.action, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 5
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: jpetstore
  labels: { app: jpetstore, part-of: basquin-demo }
spec:
  # ClusterIP, not NodePort. JaCoCo's remote-control protocol is unauthenticated and lets any
  # client dump AND RESET execution data, so port 6300 must not be reachable from outside the
  # cluster. Access both ports via `kubectl port-forward`, which is what the docs describe and
  # needs no published node port.
  type: ClusterIP
  selector: { app: jpetstore }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: jacoco, port: 6300, targetPort: 6300 }
