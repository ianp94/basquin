name: CI

on:
  push:
    paths:
      - 'agent/**'
      - 'runner/**'
      - 'examples/**'
      - 'test/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
  pull_request:
    paths:
      - 'agent/**'
      - 'runner/**'
      - 'examples/**'
      - 'test/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    name: build-and-test (JDK ${{ matrix.java }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Gradle build
        uses: gradle/gradle-build-action@v3
      - name: Build
        run: ./gradlew build --no-daemon --warning-mode all
      - name: Test
        run: ./gradlew test --no-daemon --warning-mode all
      - name: Check (verifications)
        run: ./gradlew check --no-daemon --warning-mode all

  leak-demo:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle build
        uses: gradle/gradle-build-action@v3
      - name: Leak demo should fail (expected)
        shell: bash
        run: |
          set +e
          ./gradlew runRunnerLeak --no-daemon --warning-mode all
          status=$?
          echo "Leak demo exit status: $status"
          if [ $status -eq 0 ]; then
            echo "ERROR: Leak demo unexpectedly succeeded" >&2
            exit 1
          fi
          echo "Leak demo failed as expected"
