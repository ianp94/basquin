      type: string
    - jsonPath: .status.instrumentedReplicas
      name: Instrumented
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClosureJVMTarget is the Schema for the closurejvmtargets API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClosureJVMTargetSpec defines the desired state of ClosureJVMTarget.
            properties:
              agents:
                description: Agents selects which agents to inject.
                properties:
                  coverage:
                    description: Coverage configures the JaCoCo coverage agent.
                    properties:
                      enabled:
                        description: Enabled turns on the JaCoCo agent + coverage
                          port.
                        type: boolean
                      includes:
                        description: |-
                          Includes is the JaCoCo class-include filter (e.g. "org.mybatis.jpetstore.*"). REQUIRED when
                          coverage is enabled (enforced by the XValidation rule on this struct) and deliberately has no
                          default, so it can never fall back to "*" (DD-022).
                        type: string
                      port:
                        default: 6300
                        description: Port the JaCoCo tcpserver listens on inside the
                          pod.
                        format: int32
                        maximum: 65535
                        minimum: 1
                        type: integer
                    required:
                    - enabled
                    type: object
                    x-kubernetes-validations:
                    - message: agents.coverage.includes is required when coverage
                        is enabled and must not be empty (DD-022; never default to
                        a wildcard)
                      rule: '!self.enabled || (has(self.includes) && size(self.includes)
                        > 0)'
                  threadTracker:
                    default: true
                    description: |-
                      ThreadTracker injects the native JVMTI agent (-agentpath) for the leak/thread oracle.
                      A *bool (not a plain bool) so `threadTracker: false` survives admission — with a plain bool +
                      omitempty + a true default, false marshals as "unset" and gets re-defaulted to true, making the
                      tracker impossible to disable (via the CLI or a typed client). nil = default (on).
                    type: boolean
                  valve:
                    default: true
                    description: Valve injects the Tomcat valve for server-side invariants.
                      Tomcat targets only.
                    type: boolean
                type: object
              container:
                description: |-
                  Container in the pod template to instrument. Optional: defaults to the sole container, else
                  required (a validating webhook enforces this in P2).
                type: string
              coverageService:
                description: |-
                  CoverageService, when true, creates a headless Service selecting this target's pods on the
                  coverage port so one driver can reach every replica by DNS (DD-023). Opt-in.
                type: boolean
              dashboardPush:
                description: |-
                  DashboardPush is host:port of the standalone dashboard aggregator (DD-013) to push
                  status/findings to. Empty disables push.
                type: string
              deploymentRef:
                description: DeploymentRef is the Deployment to instrument, in this
                  namespace.
                properties:
                  name:
                    description: Name of the Deployment to instrument.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              invariants:
                description: Invariants configures the -Dclosurejvm.invariant.* flags.
                properties:
                  heapDeltaMaxKb:
                    description: HeapDeltaMaxKb is the per-iteration heap-delta threshold
                      in KB.
                    format: int32
                    type: integer
                  latencyMaxMs:
                    description: LatencyMaxMs is the per-iteration latency threshold
                      in milliseconds.
                    format: int32
                    type: integer
                  mode:
                    default: soft
                    description: Mode is "soft" (collect signals) or "hard" (fail
                      the iteration).
                    enum:
                    - soft
                    - hard
                    type: string
                type: object
              jvmOptsVar:
                default: JAVA_TOOL_OPTIONS
                description: |-
                  JVMOptsVar is the env var the JVM reads launch flags from. Tomcat images honor CATALINA_OPTS;
                  everything else uses JAVA_TOOL_OPTIONS. The operator APPENDS to any existing value (DD-024),
                  never replaces it, so the app's own heap/GC flags survive instrumentation.
                enum:
                - CATALINA_OPTS
                - JAVA_TOOL_OPTIONS
                type: string
            required:
            - deploymentRef
            type: object
          status:
            description: ClosureJVMTargetStatus defines the observed state of ClosureJVMTarget.
            properties:
              conditions:
                description: Conditions follow the standard Kubernetes condition convention
                  (Ready, etc.).
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              coverageEndpoint:
                description: |-
                  CoverageEndpoint is the host:port a driver points the DD-023 coverage flag at, once P3 creates
                  the headless Service. Empty until then.
                type: string
              instrumentedReplicas:
                description: InstrumentedReplicas is how many of the target's pods
                  currently carry the agents. 0 in P1.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the spec generation this status
                  was computed from.
                format: int64
                type: integer
              phase:
                description: |-
                  Phase is a coarse lifecycle summary. In P1 the controller only ever reports Pending (observed,
                  not yet injected) — injection phases arrive with P2.
                enum:
                - Pending
                - Injecting
                - Injected
                - Reverting
                - Error
                type: string
            type: object
