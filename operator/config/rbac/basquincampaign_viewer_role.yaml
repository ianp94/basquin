# permissions for end users to view basquincampaigns.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: basquincampaign-viewer-role
rules:
- apiGroups:
  - basquin.dev
  resources:
  - basquincampaigns
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - basquin.dev
  resources:
  - basquincampaigns/status
  verbs:
  - get
